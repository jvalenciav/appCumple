publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3

